<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Ravenfield-like — Milestone 2</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="app"></div>

<div id="crosshair">
  <div class="bar bU"></div><div class="bar bD"></div>
  <div class="bar bL"></div><div class="bar bR"></div>
  <div class="dot"></div>
</div>
<div id="ammo"><span class="wname">ASSAULT RIFLE</span><br>
  <span class="mag">30</span> <span class="res">/ 120</span></div>
<div id="hint"></div>
<div id="fps"></div>

<div id="overlay"><div class="panel">
  <h1><span class="blue">EAGLE</span> vs <span class="red">RAVEN</span></h1>
  <div class="sub">FAN CLONE &middot; MILESTONE 2 &mdash; MAP: HILLLINE</div>
  <table>
    <tr><td class="k">WASD</td><td>move</td><td class="k">SHIFT</td><td>sprint</td></tr>
    <tr><td class="k">SPACE</td><td>jump</td><td class="k">RMB</td><td>iron sights</td></tr>
    <tr><td class="k">LMB</td><td>fire</td><td class="k">R</td><td>reload</td></tr>
  </table>
  <div class="deploy">CLICK TO DEPLOY &raquo;</div>
</div></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
